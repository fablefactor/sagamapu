   pronunciation) and courses/en.support.es.js (Spanish overlay,

/* ══ Localization ══════════════════════════════════════════════
   lang is 'en' (English immersion — no translations shown) or 'es' (Spanish).
   UI strings live in strings.js — use t(lang,'key') (plus the pluralDays /
   cardBackLabel shims defined there). Curriculum content is localized by

/* ══ Content resolver ══════════════════════════════════════════
   resolveCourse(supportLang) merges the course core (target-language
   content) with the support-language overlay BY ITEM ID into topics whose
   presentation fields are already chosen for the given support language
   ('es' = Spanish, anything else = immersion — core only). Fallback rules
   (identical to the Phase 2 resolver over the old merged schema):
     title:               es → overlay.title||title,  en → title
     theory heading/body: es → overlay||core,         en → core
     examples.translation:es → overlay||'',           en → ''
     flashcards.back:     es → overlay||def||'',      en → def||overlay||''
     quiz explain:        es → overlay||explain,      en → explain
   (The immersion card-back falls back to the es overlay string, mirroring
   the old enDef||es path; def coverage is 100%, so it is a dead path.)
   Everything else on the topic (id, icon, level, …) passes through. */
function resolveCourse(supportLang){
  const support = COURSE.support||{};
  const ov = support[supportLang]||null;            // active overlay, null in immersion
  const ovTopics = ov ? ov.topics : {};
  const fbTopics = (support.es||{}).topics||{};     // immersion card-back fallback (dead path)
  const out = {};
  Object.keys(CORE_TOPICS).forEach(id=>{
    const tp = CORE_TOPICS[id];
    const o = ovTopics[id]||{};
    const oTheory=o.theory||{}, oEx=o.examples||{}, oFc=o.flashcards||{}, oQz=o.quiz||{};
    const fFc = (fbTopics[id]||{}).flashcards||{};
    out[id] = {
      ...tp,
      title: ov ? (o.title||tp.title) : tp.title,
      theory: tp.theory.map(sec=>({
        heading: ov ? ((oTheory[sec.id]||{}).heading||sec.heading) : sec.heading,
        body:    ov ? ((oTheory[sec.id]||{}).body||sec.body)       : sec.body,
      })),
      examples: tp.examples.map(ex=>({
        en: ex.text,
        translation: ov ? (oEx[ex.id]||'') : '',
      })),
      flashcards: tp.flashcards.map(card=>({
        front: card.front,
        back: ov ? (oFc[card.id]||card.def||'') : (card.def||fFc[card.id]||''),
      })),
      quiz: tp.quiz.map(q=>({
        ...q,
        explain: ov ? (oQz[q.id]||q.explain) : q.explain,
      })),
    };
  });
  return out;
}
const RESOLVED_COURSES = {};
function resolvedTopic(id,lang){

/* ══ Safe localStorage JSON helpers ═════════════════════════ */
function lsGet(key,fallback){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch{ return fallback; } }
function lsSet(key,value){ try{ localStorage.setItem(key,JSON.stringify(value)); }catch{} }

/* ══ Streak Tracking ════════════════════════════════════════ */
const todayStr=()=>new Date().toISOString().slice(0,10);
function loadStreak(){ return lsGet('ptb1:streak',{streak:0,best:0,last:null}); }
function touchStreak(){
  const s=loadStreak(); const today=todayStr();
  if(s.last===today) return s;
  const yd=new Date(today); yd.setDate(yd.getDate()-1); const yesterday=yd.toISOString().slice(0,10);
  const ns=(s.last===yesterday)?s.streak+1:1;
  const updated={streak:ns,best:Math.max(ns,s.best||0),last:today};
  lsSet('ptb1:streak',updated);
  return updated;
}

/* ══ Wrong Answer Tracking ══════════════════════════════════ */
function getWrongs(){ return lsGet('ptb1:wrongs',[]); }
function addWrong(topicId,qi){
  const ws=getWrongs(); const idx=ws.findIndex(w=>w.topicId===topicId&&w.qi===qi);
  if(idx>=0){ws[idx].count++;ws[idx].last=Date.now();}else{ws.push({topicId,qi,count:1,last:Date.now()});}
  lsSet('ptb1:wrongs',ws);
}
function clearWrong(topicId,qi){ lsSet('ptb1:wrongs',getWrongs().filter(w=>!(w.topicId===topicId&&w.qi===qi))); }
function getTopWrongs(n=12){ return getWrongs().sort((a,b)=>b.count-a.count).slice(0,n); }

/* ══ Spaced Repetition (Leitner) ═══════════════════════════ */
const MIN=60000,HOUR=60*MIN,DAY=24*HOUR;
const BOX_INTERVALS=[0,MIN,12*HOUR,DAY,3*DAY,7*DAY];

/* PHASE 3 INVARIANT: fcKey stays INDEX-based (and wrongs keep their `qi`
   index) so existing localStorage progress keys keep working unchanged —
   flashcard/quiz arrays kept their pre-split order, so index-based keys
   still match. The stable item ids in the course core are dormant until
   the Phase 4 storage migration rekeys progress by item id. */
function fcKey(id,i){ return `ptb1:fc:${id}:${i}`; }
function getFCS(id,i){ return lsGet(fcKey(id,i),{box:0,next:0}); }
function setFCS(id,i,s){ lsSet(fcKey(id,i),s); }
function answerCard(id,i,result){
  const s=getFCS(id,i);
  const nb=result==='good'?Math.min(s.box+1,5):result==='close'?Math.max(s.box-1,1):1;
  setFCS(id,i,{box:nb,next:Date.now()+BOX_INTERVALS[nb]});
}
function getAllCards(id){ const tp=CORE_TOPICS[id]; if(!tp)return[]; return tp.flashcards.map((c,i)=>({...c,index:i,...getFCS(id,i)})); }
function getDueCards(id){ const now=Date.now(); return getAllCards(id).filter(c=>c.next<=now); }
function allDue(){ return ALL_TOPIC_IDS.reduce((s,id)=>s+getDueCards(id).length,0); }

/* ══ TTS ════════════════════════════════════════════════════ */
function speak(text,rate=0.9){
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang=COURSE_META.speechLocale; u.rate=rate;
    const vs=window.speechSynthesis.getVoices();
    const base=COURSE_META.speechLocale.split('-')[0];
    const v=vs.find(v=>v.lang&&v.lang.startsWith(COURSE_META.speechLocale))||vs.find(v=>v.lang&&v.lang.startsWith(base));
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ══ Speech Recognition ══════════════════════════════════════ */
const SR=typeof window!=='undefined'&&(window.SpeechRecognition||window.webkitSpeechRecognition);
function lev(a,b){ const m=a.length,n=b.length; if(!m)return n;if(!n)return m; const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); return d[m][n]; }
const norm=s=>s.toLowerCase().replace(/[^a-z0-9'\s]/g,'').replace(/\s+/g,' ').trim();
function scorePron(target,heard){
  const tw=norm(target).split(' ').filter(Boolean), hw=norm(heard).split(' ').filter(Boolean);
  const used=new Array(hw.length).fill(false);
  const words=tw.map(w=>{ let best=-1,bd=Infinity; hw.forEach((h,i)=>{ if(used[i])return; const d=lev(w,h); if(d<bd){bd=d;best=i;} }); const tol=w.length<=3?0:w.length<=6?1:2; if(best>=0&&bd===0){used[best]=true;return{w,s:'good'};} if(best>=0&&bd<=tol){used[best]=true;return{w,s:'close'};} return{w,s:'miss'}; });
  const pts=words.reduce((a,x)=>a+(x.s==='good'?1:x.s==='close'?0.5:0),0);
  return{words,pct:Math.round(pts/tw.length*100)};
}
function useListen(onResult){
  const[listening,setListening]=useState(false);
  const[micErr,setMicErr]=useState(null);
  const recRef=useRef(null);
  const cbRef=useRef(onResult);
  useEffect(()=>{ cbRef.current=onResult; },[onResult]);
  // IMPORTANT: rec.start() must run synchronously inside the click gesture.
  // On Safari/iOS, awaiting getUserMedia first drops us out of the user-gesture
  // context and recognition silently never records. So we call start() directly
  // and let SpeechRecognition handle its own mic permission; errors surface via onerror.
  const start=useCallback(()=>{
    if(!SR){ setMicErr('error'); return; }
    setMicErr(null);
    try{ window.speechSynthesis&&window.speechSynthesis.cancel(); }catch(e){}
    try{
      const rec=new SR(); recRef.current=rec; rec.lang=COURSE_META.speechLocale; rec.interimResults=false; rec.maxAlternatives=1; rec.continuous=false;
      rec.onresult=e=>{ setListening(false); try{ cbRef.current(e.results[0][0].transcript); }catch(_){} };
      rec.onerror=e=>{ setListening(false); const c=(e&&e.error)||'unknown'; setMicErr(c==='not-allowed'||c==='service-not-allowed'?'perm':c==='no-speech'?'nospeech':c==='aborted'?null:'error'); };
      rec.onend=()=>setListening(false);
      setListening(true); rec.start();
    }catch(e){ setListening(false); setMicErr('error'); }
  },[]);
  const stop=useCallback(()=>{ try{recRef.current&&recRef.current.stop();}catch(e){} setListening(false); },[]);
  return{listening,start,stop,supported:!!SR,micErr};
}

function QuizOption({op,i,checked,picked,correct,onPick}){
  const isRight=picked===correct;
  let bg=C.card,bdr=C.line;
  if(checked&&i===correct){bg=C.greenSoft;bdr=C.green;}

  return(
    <button disabled={checked} onClick={()=>onPick(i)}
      style={{background:bg,border:`2px solid ${bdr}`,borderRadius:12,padding:'12px 14px',textAlign:'left',fontSize:16,fontWeight:600,cursor:checked?'default':'pointer',fontFamily:FONT}}>

/* ══ Placement Test ══════════════════════════════════════════ */
function PlacementTest({onDone,lang='en'}){
  const[qi,setQi]=useState(0);
  const[picked,setPicked]=useState(null);
  const[checked,setChecked]=useState(false);
  const[answers,setAnswers]=useState([]);

  const q=PLACEMENT_QS[qi];
  const last=qi===PLACEMENT_QS.length-1;

  const finish=(lv)=>{ try{localStorage.setItem('ptb1:placementDone','1');}catch{} onDone(lv); };
  const doNext=()=>{
    const newAnswers=[...answers,{level:q.level,correct:picked===q.ans}];
    if(last){
      const by={A1:{ok:0,tot:0},A2:{ok:0,tot:0},B1:{ok:0,tot:0}};
      newAnswers.forEach(a=>{by[a.level].tot++;if(a.correct)by[a.level].ok++;});
      const pct=lv=>by[lv].tot>0?by[lv].ok/by[lv].tot*100:0;
      let lv='A1';
      if(pct('A1')>=60&&pct('A2')>=60)lv='B1';
      else if(pct('A1')>=60)lv='A2';
      finish(lv);
    }else{
      setAnswers(newAnswers);
      setQi(qi+1);
      setPicked(null);
      setChecked(false);
    }
  };

  const lvCol={A1:C.teal,A2:'#9A6B12',B1:C.purple};
  return(
    <div>
      <div style={{textAlign:'center',padding:'28px 0 18px'}}>
        <div style={{fontSize:44,marginBottom:10}}>🎯</div>
        <h1 style={{margin:0,fontSize:24,fontWeight:800,color:C.teal}}>{t(lang,'placement.title')}</h1>
        <div style={{color:C.sub,fontSize:14,marginTop:4}}>{t(lang,'placement.subtitle',{n:PLACEMENT_QS.length})}</div>
      </div>
      <div style={{marginBottom:8}}><ProgBar value={qi+1} max={PLACEMENT_QS.length}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{qi+1} / {PLACEMENT_QS.length}</div>
        <Badge color={lvCol[q.level]} bg={q.level==='A1'?C.tealSoft:q.level==='A2'?C.amberSoft:C.purpleSoft}>{q.level}</Badge>
      </div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{q.q}</div>
      </div>
      <div style={{display:'grid',gap:8,marginBottom:14}}>
        {q.opts.map((op,i)=>(
          <QuizOption key={i} op={op} i={i} checked={checked} picked={picked} correct={q.ans} onPick={setPicked}/>
        ))}
      </div>
      <QuizNav checked={checked} picked={picked} onCheck={()=>setChecked(true)} onNext={doNext} lang={lang}
        nextLabel={last?t(lang,'placement.seeMyLevel'):t(lang,'common.next')}/>
      <button onClick={()=>finish('A1')}
        style={{...S.ghost,width:'100%',marginTop:10,fontSize:13}}>{t(lang,'placement.skip')}</button>
    </div>
  );
}

function LessonFlow({topicId,lang,onBack,onComplete,addXP}){
  const tp=resolvedTopic(topicId,lang);
  const[step,setStep]=useState('theory');
  const[tIdx,setTIdx]=useState(0);
  const[qi,setQi]=useState(0);
  const[picked,setPicked]=useState(null);
  const[checked,setChecked]=useState(false);
  const[right,setRight]=useState(0);

  const resetQuiz=()=>{ setQi(0);setPicked(null);setChecked(false);setRight(0); };

  if(step==='theory'){
    const sec=tp.theory[tIdx]; const last=tIdx===tp.theory.length-1;
    return(
      <div>
        <BackBar title={tp.title} onBack={onBack}/>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {tp.theory.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=tIdx?C.teal:C.line,transition:'background .3s'}}/>
          ))}
        </div>
        <div style={{...S.card,marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:16,color:C.teal,marginBottom:10}}>📖 {sec.heading}</div>
          <div className="theory-body" style={{fontSize:15,lineHeight:1.7,color:C.ink}} dangerouslySetInnerHTML={{__html:sec.body}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          {tIdx>0&&<button onClick={()=>setTIdx(tIdx-1)} style={S.ghost}>{t(lang,'lessons.prev')}</button>}
          <button onClick={()=>{ if(last)setStep('examples'); else setTIdx(tIdx+1); }} style={{...S.btn(C.teal),flex:1}}>
            {last?t(lang,'lessons.seeExamples'):t(lang,'common.next')}
          </button>
        </div>
      </div>
    );
  }

  if(step==='examples') return(
    <div>
      <BackBar title={tp.title} onBack={()=>{setStep('theory');setTIdx(0);}}/>
      <div style={{...S.card,marginBottom:10,background:C.tealSoft,border:'none',padding:'12px 14px'}}>
        <div style={{fontWeight:700,fontSize:14,color:C.teal}}>{t(lang,'lessons.examplesIntro')}</div>
      </div>
      <div style={{display:'grid',gap:8,marginBottom:18}}>
        {tp.examples.map((ex,i)=>{
          const tr=ex.translation;
          return(
            <div key={i} style={{...S.card,padding:14,display:'flex',gap:10,alignItems:'flex-start'}}>
              <button onClick={()=>speak(ex.en)} aria-label="Listen" style={{background:C.tealSoft,border:'none',borderRadius:10,width:38,height:38,cursor:'pointer',fontSize:17,flexShrink:0}}>🔊</button>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{ex.en}</div>
                {tr&&<div style={{fontSize:13,color:C.sub,marginTop:3}}>{tr}</div>}
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={()=>setStep('quiz')} style={{...S.btn(C.teal),width:'100%'}}>{t(lang,'lessons.startQuiz')}</button>
    </div>
  );

  if(step==='quiz'){
    const ex=tp.quiz[qi]; const isRight=picked===ex.correct;
    return(
      <div>
        <BackBar title={`${t(lang,'quiz.q')}${qi+1} ${t(lang,'quiz.of')} ${tp.quiz.length}`} onBack={()=>setStep('examples')}/>
        <div style={{marginBottom:12}}><ProgBar value={qi+1} max={tp.quiz.length}/></div>
        <div style={{...S.card,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:17,lineHeight:1.5}}>{ex.q}</div>
        </div>
        <div style={{display:'grid',gap:8}}>
          {ex.options.map((op,i)=>(
            <QuizOption key={i} op={op} i={i} checked={checked} picked={picked} correct={ex.correct} onPick={setPicked}/>
          ))}
        </div>
        {checked&&<QuizFeedback isRight={isRight} explain={ex.explain} lang={lang}/>}
        <div style={{marginTop:14}}>
          <QuizNav checked={checked} picked={picked} lang={lang}
            onCheck={()=>{setChecked(true);if(isRight){setRight(r=>r+1);clearWrong(topicId,qi);}else{addWrong(topicId,qi);}}}
            onNext={()=>{ if(qi+1<tp.quiz.length){setQi(qi+1);setPicked(null);setChecked(false);}else setStep('done'); }}
            nextLabel={qi+1<tp.quiz.length?t(lang,'common.next'):t(lang,'quiz.seeResults')}/>
        </div>
      </div>
    );
  }

  // done
  const total=tp.quiz.length; const passed=right>=Math.ceil(total*0.6); const earned=right*10;
  return(
    <div>
      <BackBar title={t(lang,'lessons.complete')} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:36}}>
        <div style={{fontSize:52}}>{passed?'🎉':'💪'}</div>
        <div style={{fontSize:22,fontWeight:800,margin:'12px 0 4px'}}>{right}/{total} {t(lang,'lessons.correct')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{passed?t(lang,'lessons.wellDone'):t(lang,'lessons.needSixty')}</div>
        {passed?(
          <button onClick={()=>onComplete(right)} style={{...S.btn(C.teal),width:'100%'}}>
            {t(lang,'lessons.finishEarn',{xp:earned})}
          </button>
        ):(
          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            <button onClick={()=>{setStep('theory');setTIdx(0);resetQuiz();}} style={S.btn(C.amber,'#1C2B33')}>{t(lang,'lessons.review')}</button>
            <button onClick={()=>{setStep('quiz');resetQuiz();}} style={S.btn(C.teal)}>{t(lang,'lessons.retry')}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function FlashcardDeck({topicId,lang,addXP,onBack}){
  const tp=resolvedTopic(topicId,lang);
  const[done,setDone]=useState(false);
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[session]=useState(()=>{ const all=getAllCards(topicId),now=Date.now(); const due=all.filter(c=>c.next<=now); return due.length>0?due:all; });

  useEffect(()=>setFlipped(false),[idx]);

  if(done||session.length===0) return(
    <div>
      <BackBar title={tp.title} onBack={onBack}/>
      <div style={{...S.card,textAlign:'center',padding:36}}>
        <div style={{fontSize:48,marginBottom:12}}>🎴</div>
        <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>{t(lang,'flashcards.allReviewed')}</div>
        <div style={{color:C.sub,fontSize:14,marginBottom:20}}>{t(lang,'flashcards.allReviewedSub')}</div>
        <button onClick={onBack} style={{...S.btn(C.purple),width:'100%'}}>{t(lang,'flashcards.backToTopics')}</button>
      </div>
    </div>
  );

  const card=session[idx];
  const answer=(result)=>{ answerCard(topicId,card.index,result); if(result==='good')addXP(5); if(idx+1>=session.length)setDone(true); else{setIdx(idx+1);setFlipped(false);} };

  return(
    <div>
      <BackBar title={tp.title} onBack={onBack}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{session.length-idx} {t(lang,'flashcards.remaining')}</div>
        <div style={{display:'flex',gap:5}}>
          {[1,2,3,4,5].map(b=><div key={b} style={{width:8,height:8,borderRadius:'50%',background:(card.box||0)>=b?C.purple:C.line}}/>)}
        </div>
      </div>
      <ProgBar value={idx} max={session.length} color={C.purple}/>
      <div style={{marginTop:12}} className="fc-scene" role="button" tabIndex={0} aria-label="Flip card" onClick={()=>setFlipped(f=>!f)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&setFlipped(f=>!f)}>
        <div className={`fc-card${flipped?' flipped':''}`}>
          <div className="fc-face" style={{background:C.card}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.sub,textTransform:'uppercase',marginBottom:12}}>English</div>
            <div style={{fontWeight:800,fontSize:20,lineHeight:1.4}}>{card.front}</div>
            <div style={{fontSize:13,color:C.sub,marginTop:14}}>{t(lang,'flashcards.tapToReveal')}</div>
          </div>
          <div className="fc-face fc-back" style={{background:C.tealSoft}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.teal,textTransform:'uppercase',marginBottom:12}}>{cardBackLabel(lang)}</div>
            <div style={{fontWeight:800,fontSize:lang==='es'?20:18,lineHeight:1.4,color:C.teal}}>{tp.flashcards[card.index].back}</div>
            <div style={{fontSize:13,color:C.teal,marginTop:14,opacity:.7}}>{t(lang,'flashcards.howWell')}</div>
          </div>
        </div>
      </div>
      {flipped?(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:14}}>
          <button onClick={()=>answer('miss')} style={{...S.btn(C.coralSoft,C.coral)}}>{t(lang,'flashcards.missed')}</button>
          <button onClick={()=>answer('close')} style={{...S.btn(C.amberSoft,'#9A6B12')}}>{t(lang,'flashcards.almost')}</button>
          <button onClick={()=>answer('good')} style={{...S.btn(C.greenSoft,C.green)}}>{t(lang,'flashcards.gotIt')}</button>
        </div>
      ):(
        <button onClick={()=>setFlipped(true)} style={{...S.btn(C.purple),width:'100%',marginTop:14}}>{t(lang,'flashcards.reveal')}</button>
      )}
      <button onClick={()=>speak(card.front)} style={{...S.ghost,width:'100%',marginTop:8,fontSize:14}}>🔊 {t(lang,'flashcards.hearPron')}</button>
    </div>
  );
}

        ))}
      </div>
      {checked&&<QuizFeedback isRight={isRight} explain={qdata.explain} lang={lang}/>}
      <div style={{marginTop:14}}>
        <QuizNav checked={checked} picked={picked} lang={lang} color={C.coral}
          onCheck={()=>setChecked(true)}
          onNext={()=>{if(isRight)clearWrong(w.topicId,w.qi);setIdx(i=>i+1);setPicked(null);setChecked(false);}}
          nextLabel={idx+1<list.length?t(lang,'common.next'):t(lang,'weak.finish')}/>
      </div>
    </div>
  );
}

/* ══ Pronunciation ═══════════════════════════════════════════ */
function PronScreen({level,lang,addXP,onBack}){
  const sentences=PRON_SENTENCES[level];
  const[idx,setIdx]=useState(0);
  const[result,setResult]=useState(null);
  const target=sentences[idx%sentences.length];
  const{listening,start,stop,supported,micErr}=useListen(heard=>{ const r=scorePron(target,heard); setResult({...r,heard}); addXP(Math.round(r.pct/10)); });
  const next=()=>{setIdx(idx+1);setResult(null);try{window.speechSynthesis.cancel();}catch(e){}};
  return(
    <div>
      <BackBar title={`${t(lang,'nav.pronunciation')} · ${level}`} onBack={onBack}/>
      {!supported&&<div style={{...S.card,background:C.amberSoft,border:'none',marginBottom:12,fontSize:14}}>⚠️ {t(lang,'pron.noMic')}</div>}
      <div style={{...S.card,textAlign:'center',padding:28,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:C.sub,textTransform:'uppercase',marginBottom:14}}>{t(lang,'pron.sayThis')}</div>
        <div style={{fontSize:19,fontWeight:800,lineHeight:1.55,marginBottom:18}}>"{target}"</div>
        <button onClick={()=>speak(target,0.82)} style={{...S.ghost,marginBottom:20,fontSize:14}}>🔊 {t(lang,'pron.hearFirst')}</button>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <button onClick={listening?stop:start} disabled={!supported} aria-label="Microphone" className={listening?'mic-recording':''}
            style={{width:72,height:72,borderRadius:'50%',border:'none',cursor:supported?'pointer':'default',background:listening?C.coral:C.teal,color:'#fff',fontSize:30,boxShadow:listening?'none':'0 2px 6px rgba(0,0,0,.15)',transition:'background .2s',opacity:supported?1:0.4}}>
            {listening?'■':'🎤'}
          </button>
          <div style={{fontSize:13,color:listening?C.coral:C.sub,fontWeight:600}}>
            {listening?t(lang,'pron.listening'):t(lang,'pron.tapMic')}
          </div>
          {micErr==='perm'&&<div style={{fontSize:12.5,color:C.coral,fontWeight:600}}>{t(lang,'pron.micBlocked')}</div>}
          {micErr==='nospeech'&&<div style={{fontSize:12.5,color:C.coral,fontWeight:600}}>{t(lang,'pron.noSpeech')}</div>}
        </div>
      </div>
      {result&&(
        <div style={{...S.card}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:16}}>{t(lang,'pron.match')}: <span style={{color:result.pct>=85?C.green:result.pct>=60?'#9A6B12':C.coral}}>{result.pct}%</span></div>
            <div style={{fontSize:13,color:C.sub,fontWeight:600}}>{result.pct>=85?t(lang,'pron.excellent'):result.pct>=60?t(lang,'pron.good'):t(lang,'pron.keepPractising')}</div>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {result.words.map((w,i)=>{ const{bg,col}=WC[w.s]||WC.miss; return <span key={i} style={{background:bg,color:col,padding:'4px 10px',borderRadius:99,fontWeight:700,fontSize:14}}>{w.w}</span>; })}
          </div>
          <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{t(lang,'pron.iHeard')}: "{result.heard}"</div>
          <button onClick={next} style={{...S.btn(C.teal),width:'100%'}}>{t(lang,'pron.nextSentence')}</button>
        </div>
      )}
    </div>
  );
}

/* ══ Progress ════════════════════════════════════════════════ */
function ProgressScreen({xp,lang,completed,streak,onBack}){
  const now=Date.now();
  let masteredCards=0,dueNow=0;
  const masteryMap={};
  ALL_TOPIC_IDS.forEach(id=>{
    const cards=getAllCards(id);
    masteryMap[id]=cards.filter(c=>c.box>=5).length;
    masteredCards+=masteryMap[id];
    dueNow+=cards.filter(c=>c.next<=now).length;
  });
  return(
    <div>
      <BackBar title={t(lang,'nav.progress')} onBack={onBack}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[
          {label:t(lang,'progress.totalXP'),val:`${xp} XP`,icon:'⭐',col:C.amber,bg:C.amberSoft},
          {label:t(lang,'progress.topicsDone'),val:`${(completed||[]).length}/${ALL_TOPIC_IDS.length}`,icon:'📚',col:C.teal,bg:C.tealSoft},
          {label:t(lang,'progress.cardsMastered'),val:`${masteredCards}/${TOTAL_CARDS}`,icon:'🃏',col:C.purple,bg:C.purpleSoft},
          {label:t(lang,'progress.cardsDueNow'),val:`${dueNow}`,icon:'🔔',col:C.coral,bg:C.coralSoft},
          {label:t(lang,'progress.currentStreak'),val:`${streak.streak} ${pluralDays(lang,streak.streak)}`,icon:'🔥',col:'#C05000',bg:'#FFF0E8'},
          {label:t(lang,'progress.bestStreak'),val:`${streak.best} ${pluralDays(lang,streak.best)}`,icon:'🏆',col:C.amber,bg:C.amberSoft},
        ].map(s=>(
          <div key={s.label} style={{...S.card,background:s.bg,border:'none',textAlign:'center',padding:'16px 12px'}}>
            <div style={{fontSize:28,marginBottom:4}}>{s.icon}</div>
            <div style={{fontWeight:800,fontSize:20,color:s.col}}>{s.val}</div>
            <div style={{fontSize:12,color:C.sub,fontWeight:600,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      {LEVELS.map(lv=>{
        const ids=LEVEL_TOPICS[lv]; const done=ids.filter(id=>(completed||[]).includes(id)).length;
        return(
          <div key={lv} style={{...S.card,marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:15,color:C.teal,marginBottom:8}}>{lv} — {done}/{ids.length} {t(lang,'progress.topics')}</div>
            <div style={{marginBottom:10}}><ProgBar value={done} max={ids.length}/></div>
            <div style={{display:'grid',gap:7}}>
              {ids.map(id=>{
                const tp=resolvedTopic(id,lang); const tdone=(completed||[]).includes(id); const m=masteryMap[id];
                return(
                  <div key={id} style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:15}}>{tp.icon}</span>
                    <span style={{flex:1,fontSize:14,fontWeight:600,color:tdone?C.ink:C.sub}}>{tp.title}</span>
                    {tdone&&<Badge color={C.green} bg={C.greenSoft}>✓</Badge>}
                    <span style={{fontSize:12,color:C.sub}}>{m}/{tp.flashcards.length} {t(lang,'progress.cards')}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

    {id:'en',flag:'🇬🇧',label:'English',sub:t(lang,'settings.immersionSub')},
    {id:'es',flag:'🇪🇸',label:'Español',sub:t(lang,'settings.spanishSub')},
  ];
  return(
    <div>
      <BackBar title={t(lang,'settings.title')} onBack={onBack}/>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{t(lang,'settings.tutorLanguage')}</div>
      <div style={{...S.card,marginBottom:18}}>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{t(lang,'settings.tutorLanguageDesc')}</div>
        <div style={{display:'grid',gap:8}}>

                  <div style={{fontWeight:800,fontSize:15,color:active?C.teal:C.ink}}>{o.label}</div>

      <div style={{...S.card,marginBottom:18}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{t(lang,'settings.placementTest')}</div>

      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{t(lang,'settings.resetProgress')}</div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{t(lang,'settings.resetLevel')}</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {LEVELS.map(lv=>(
            <button key={lv} onClick={()=>onResetLevel(lv)} style={{...S.ghost,padding:'10px 0'}}>{t(lang,'settings.reset')} {lv}</button>
          ))}
        </div>
      </div>
      <div style={{...S.card,marginBottom:18,border:`1.5px solid ${C.coral}`}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4,color:C.coral}}>{t(lang,'settings.resetEverything')}</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:12,lineHeight:1.5}}>{t(lang,'settings.resetEverythingDesc')}</div>
        <button onClick={onResetAll} style={{...S.btn(C.coral),width:'100%'}}>🗑️ {t(lang,'settings.resetAll')}</button>

      {sbClient&&(
        <>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,color:C.sub,textTransform:'uppercase',margin:'4px 0 10px'}}>{t(lang,'settings.account')}</div>

/* ══ App Root ════════════════════════════════════════════════ */
function App({user}){
  const[screen,setScreen]=useState('home');
  const[level,setLevelState]=useState(()=>{ try{return localStorage.getItem('ptb1:level')||'A1';}catch{return'A1';} });
  const[lang,setLangState]=useState(()=>{ try{return localStorage.getItem('ptb1:lang')||'en';}catch{return'en';} });
  const[st,setSt]=useState(()=>loadApp()||{xp:0,completed:[]});
  const[dueCount,setDueCount]=useState(()=>allDue());
  const[streak,setStreak]=useState(()=>loadStreak());
  const[weakCount,setWeakCount]=useState(()=>getTopWrongs().length);
  const[showPlacement,setShowPlacement]=useState(()=>{ try{return!localStorage.getItem('ptb1:placementDone');}catch{return false;} });

  const syncTimerRef=useRef(null);
  const scheduleSync=useCallback((delay=1500)=>{
    if(!user||!sbClient)return;
    clearTimeout(syncTimerRef.current);
    if(delay)syncTimerRef.current=setTimeout(()=>syncToSupabase(sbClient,user.id),delay);
    else syncToSupabase(sbClient,user.id);
  },[user]);
  const syncNow=useCallback(()=>scheduleSync(0),[scheduleSync]);

  useEffect(()=>{ saveApp(st); scheduleSync(); },[st,scheduleSync]);
  useEffect(()=>{ scheduleSync(); setDueCount(allDue()); setWeakCount(getTopWrongs().length); },[screen,scheduleSync]);
  useEffect(()=>{
    const h=()=>{if(document.visibilityState==='hidden')syncNow();};
    document.addEventListener('visibilitychange',h);
    return()=>document.removeEventListener('visibilitychange',h);
  },[syncNow]);

  const setLevel=(lv)=>{ setLevelState(lv); try{localStorage.setItem('ptb1:level',lv);}catch{} scheduleSync(); };
  const setLang=(l)=>{ setLangState(l); try{localStorage.setItem('ptb1:lang',l);}catch{} scheduleSync(); };
  const addXP=n=>{ setSt(s=>({...s,xp:(s.xp||0)+n})); setStreak(touchStreak()); };
  const completeTopic=id=>setSt(s=>({...s,completed:s.completed.includes(id)?s.completed:[...s.completed,id]}));

  const rerunPlacement=()=>{ try{localStorage.removeItem('ptb1:placementDone');}catch{} setScreen('home'); setShowPlacement(true); };
  const resetLevel=(lv)=>{
    if(!window.confirm(`Reset all ${lv} progress?\n\nThis clears your completed ${lv} lessons, flashcard memory and weak points for ${lv}. It cannot be undone.`)) return;
    clearLevelStorage(lv);
    setSt(s=>({...s,completed:(s.completed||[]).filter(id=>!LEVEL_TOPICS[lv].includes(id))}));
    setDueCount(allDue()); setWeakCount(getTopWrongs().length);
  };
  const resetAll=()=>{
    if(!window.confirm('Reset ALL progress?\n\nThis erases your XP, streaks, completed lessons, flashcard progress and weak points, and restarts onboarding. It cannot be undone.')) return;
    clearAllProgress();
    setSt({xp:0,completed:[]}); setStreak({streak:0,best:0,last:null});
    setDueCount(0); setWeakCount(0); setLevelState('A1'); setScreen('home'); setShowPlacement(true);
  };
  const signOut=async()=>{ syncNow(); if(sbClient)await sbClient.auth.signOut(); };

  if(showPlacement) return(
    <div style={S.page}><div style={S.shell}>
      <PlacementTest lang={lang} onDone={(lv)=>{ setLevel(lv); setShowPlacement(false); }}/>
    </div></div>
  );

  return(
    <div style={S.page}>
      <div style={S.shell}>
        {screen==='home'&&<HomeScreen level={level} setLevel={setLevel} lang={lang} xp={st.xp} completed={st.completed} dueCount={dueCount} streak={streak} weakCount={weakCount} onNav={setScreen}/>}
        {screen==='lessons'&&<LessonsScreen level={level} lang={lang} completed={st.completed} onComplete={(id,score)=>{completeTopic(id);addXP(score*10);}} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='cards'&&<FlashcardsScreen level={level} lang={lang} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='pron'&&<PronScreen level={level} lang={lang} addXP={addXP} onBack={()=>setScreen('home')}/>}
        {screen==='progress'&&<ProgressScreen xp={st.xp} lang={lang} completed={st.completed} streak={streak} onBack={()=>setScreen('home')}/>}
        {screen==='weakpoints'&&<WeakPointsScreen lang={lang} onBack={()=>{ setWeakCount(getTopWrongs().length); setScreen('home'); }}/>}
        {screen==='settings'&&<SettingsScreen lang={lang} setLang={setLang} user={user} onSignOut={signOut} onBack={()=>setScreen('home')} onRerunPlacement={rerunPlacement} onResetLevel={resetLevel} onResetAll={resetAll}/>}
      </div>
    </div>
  );
}

/* ══ App Shell (auth wrapper) ═══════════════════════════════ */
function AppShell(){
  const[phase,setPhase]=useState('checking'); // 'checking' | 'login' | 'app'
  const[user,setUser]=useState(null);
  const userRef=useRef(null);

  useEffect(()=>{
    if(!sbClient){ setPhase('app'); return; }

    const enterApp=async(u)=>{
      userRef.current=u;
      setUser(u);
      await restoreFromSupabase(sbClient,u.id);
      setPhase('app');
    };

    sbClient.auth.getSession().then(({data:{session}})=>{
      if(session?.user)enterApp(session.user);
      else setPhase('login');
    });

    const{data:{subscription}}=sbClient.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_IN'&&session?.user&&!userRef.current){
        enterApp(session.user);
      }else if(event==='SIGNED_OUT'){
        userRef.current=null;
        setUser(null);
        setPhase('login');
      }
    });

    return()=>subscription.unsubscribe();
  },[]);

  if(phase==='checking') return(
    <div style={{...S.page,alignItems:'center',justifyContent:'center'}}>
      <div style={{color:C.sub,fontSize:15,padding:40}}>Loading…</div>
    </div>
  );
  if(phase==='login') return <LoginScreen/>;
  return <App user={user}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppShell/>);
</script>
</body>
