# Netlify configuration for "Pathway to B1"
# Static, no-build site: JSX is compiled in the browser via Babel Standalone,
# so there is no build step — Netlify just serves the repo root as-is.
[build]
  publish = "."
  command = ""

# Scheduled function that keeps the Supabase free-tier project awake.
# See netlify/functions/keepalive.mjs for how the once-a-day, random-night
# timing works.
[functions]
  directory = "netlify/functions"

# Update-friendliness for phone home-screen installs: nothing here has
# content-hashed filenames, so NOTHING may be cached without revalidation.
# no-cache = "store, but revalidate before use" — with Netlify's ETags a
# reload after deploy always picks up the new version (and version.js is
# what the in-app update check fetches fresh at every start).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
